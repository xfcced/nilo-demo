<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nilo WebTransport Physics Demo</title>
  </head>
  <body>
    <main id="app">
      <canvas id="scene"></canvas>

      <button id="debugToggle" class="debug-toggle" type="button" aria-controls="debugPanel" aria-expanded="true">
        Hide Dev
      </button>

      <section id="debugPanel" aria-label="Network debug panel">
        <div class="panel-title">Dev</div>

        <label class="field">
          <span>URL</span>
          <input id="urlInput" value="https://localhost:4433/webtransport" />
        </label>

        <label class="field">
          <span>Cert</span>
          <input id="hashInput" value="ded2563223766b2f6b61179c544fc3984a34e678aded1438f4316b837af45050" />
        </label>

        <div class="actions">
          <button id="connectButton">Connect</button>
          <button id="disconnectButton" disabled>Disconnect</button>
        </div>

        <div class="metrics">
          <div><span>Conn</span><strong id="connectionValue">disconnected</strong></div>
          <div><span>ID</span><strong id="playerIdValue">-</strong></div>
          <div><span>RTT</span><strong id="rttValue">-</strong></div>
          <div><span>FPS</span><strong id="fpsValue">-</strong></div>
          <div><span>Tick</span><strong id="serverTickValue">-</strong></div>
          <div><span>Rx</span><strong id="rxMessageValue">-</strong></div>
          <div><span>Tx</span><strong id="txMessageValue">-</strong></div>
          <div><span>Down</span><strong id="downloadValue">-</strong></div>
          <div><span>Up</span><strong id="uploadValue">-</strong></div>
        </div>

        <pre id="log"></pre>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
