name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CLIENT_IMAGE: ghcr.io/xfcced/nilo-demo-client
  SERVER_IMAGE: ghcr.io/xfcced/nilo-demo-server
  VITE_WEBTRANSPORT_URL: https://wt.luchang.xyz/webtransport
  VITE_CERTIFICATE_HASH: ""

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
      deploy: ${{ steps.filter.outputs.deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed projects
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client:
              - '.github/workflows/build-images.yml'
              - '.dockerignore'
              - 'client/**'
              - 'config/**'
            server:
              - '.github/workflows/build-images.yml'
              - '.dockerignore'
              - 'server/**'
              - 'config/**'
            deploy:
              - '.github/workflows/build-images.yml'
              - 'docker-compose.yml'

  build-client:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.client == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          build-args: |
            VITE_WEBTRANSPORT_URL=${{ env.VITE_WEBTRANSPORT_URL }}
            VITE_CERTIFICATE_HASH=${{ env.VITE_CERTIFICATE_HASH }}
          tags: |
            ${{ env.CLIENT_IMAGE }}:latest
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

  build-server:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  deploy:
    needs:
      - changes
      - build-client
      - build-server
    if: >-
      ${{
        always() &&
        needs.build-client.result != 'failure' &&
        needs.build-client.result != 'cancelled' &&
        needs.build-server.result != 'failure' &&
        needs.build-server.result != 'cancelled' &&
        (
          github.event_name == 'workflow_dispatch' ||
          needs.changes.outputs.client == 'true' ||
          needs.changes.outputs.server == 'true' ||
          needs.changes.outputs.deploy == 'true'
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            git pull --ff-only
            docker compose pull
            docker compose up -d
            docker image prune -f
