services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_WEBTRANSPORT_URL: https://wt.luchang.xyz/webtransport
        VITE_CERTIFICATE_HASH: ""
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: "4433"
      TLS_CERT_FILE: /etc/letsencrypt/live/wt.luchang.xyz/fullchain.pem
      TLS_KEY_FILE: /etc/letsencrypt/live/wt.luchang.xyz/privkey.pem
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "443:4433/udp"
    restart: unless-stopped
